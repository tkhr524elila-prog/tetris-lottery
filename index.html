<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>テトリミノカード抽選</title>

<style>
:root {
  --bg: #f5f7fb;
  --panel: #fff;
  --line: #ddd;

  --i:#22d3ee; --o:#facc15; --t:#c084fc;
  --s:#4ade80; --z:#f87171; --j:#60a5fa; --l:#fb923c;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  background: var(--bg);
  touch-action: manipulation;
}

.wrap {
  max-width: 900px;
  margin: auto;
  padding: 16px;
}

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 16px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 8px;
}

.toggle {
  border:1px solid #ccc;
  border-radius:10px;
  padding:6px;
  cursor:pointer;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  min-height:80px;
  touch-action: manipulation;
}

.toggle.active {
  background:#111;
  color:#fff;
}

.cards {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card {
  min-height:130px;
  border-radius:12px;
  border:1px solid #ccc;
  background:#1e40af;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  text-align:center;
  padding:6px;
  touch-action: manipulation;
}

.card.open {
  background:#fff;
  color:#000;
}

button {
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  cursor:pointer;
  touch-action: manipulation;
}

.primary {
  background:#111;
  color:#fff;
}

.status {
  margin-top:8px;
  font-size:14px;
}

/* ミニテトリミノ */
.shape {
  display:grid;
  gap:2px;
}
.row { display:flex; gap:2px; }

.cell {
  width:10px; height:10px;
  background:#e5e7eb;
}

.fill-i{background:var(--i)}
.fill-o{background:var(--o)}
.fill-t{background:var(--t)}
.fill-s{background:var(--s)}
.fill-z{background:var(--z)}
.fill-j{background:var(--j)}
.fill-l{background:var(--l)}

.big { font-size:26px; font-weight:bold; }
.small { font-size:12px; }

.summary {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.pill {
  font-size:12px;
  background:#f3f4f6;
  padding:4px 8px;
  border-radius:999px;
}
</style>
</head>

<body>
<div class="wrap">

<h2>テトリミノカード抽選</h2>

<div class="panel">
  コイン：<b id="coin">0</b>
  <button id="eatBtn">🍽 完食</button>
</div>

<div class="panel">
  除外カード
  <div class="grid" id="excludeGrid"></div>
</div>

<div class="panel">
  <button class="primary" id="drawBtn">カードを並べる</button>
  <button id="revealBtn" disabled>答えを見る</button>
  <button id="resetBtn">リセット</button>

  <div class="summary">
    <div class="pill">除外: <span id="exCnt">0</span></div>
    <div class="pill">枚数: <span id="cardCnt">9</span></div>
    <div class="pill">消費: <span id="cost">1</span></div>
  </div>

  <div class="status" id="status"></div>
</div>

<div class="panel">
  <div class="cards" id="cards"></div>
</div>

</div>

<script>
const DATA = [
  {id:"I"}, {id:"O"}, {id:"T"},
  {id:"S"}, {id:"Z"}, {id:"J"}, {id:"L"},
  {id:"A♥"}, {id:"🃏"}
];

const SHAPES = {
  I:[[1,1,1,1]],
  O:[[1,1],[1,1]],
  T:[[0,1,0],[1,1,1]],
  S:[[0,1,1],[1,1,0]],
  Z:[[1,1,0],[0,1,1]],
  J:[[1,0,0],[1,1,1]],
  L:[[0,0,1],[1,1,1]]
};

let coin=0;
let excluded=new Set();
let deck=[];
let opened=false;
let prepared=false;

const coinEl = coinSpan = document.getElementById("coin");
const grid = document.getElementById("excludeGrid");
const cards = document.getElementById("cards");
const status = document.getElementById("status");
const costEl = document.getElementById("cost");
const exCnt = document.getElementById("exCnt");
const cardCnt = document.getElementById("cardCnt");
const revealBtn = document.getElementById("revealBtn");

function cost(){ return 1 + excluded.size; }

function updateUI(){
  coinEl.textContent = coin;
  costEl.textContent = cost();
  exCnt.textContent = excluded.size;
  cardCnt.textContent = DATA.length - excluded.size;
}

function shapeHTML(id){
  if(!SHAPES[id]) return "";
  return `<div class="shape">` +
    SHAPES[id].map(r =>
      `<div class="row">` +
      r.map(c=>`<div class="cell ${c?`fill-${id.toLowerCase()}`:""}"></div>`).join("") +
      `</div>`
    ).join("") +
  `</div>`;
}

function iconHTML(id){
  if(SHAPES[id]) return shapeHTML(id);
  return `<div class="big">${id}</div>`;
}

function renderExclude(){
  grid.innerHTML="";
  DATA.forEach(d=>{
    const el=document.createElement("div");
    el.className="toggle"+(excluded.has(d.id)?" active":"");

    el.innerHTML = iconHTML(d.id) + `<div class="small">${d.id}</div>`;

    el.onclick=()=>{
      if(prepared) return;
      excluded.has(d.id)?excluded.delete(d.id):excluded.add(d.id);
      renderExclude(); updateUI();
    };

    grid.appendChild(el);
  });
}

function renderCards(){
  cards.innerHTML="";
  deck.forEach(d=>{
    const el=document.createElement("div");
    el.className="card"+(d.open?" open":"");

    el.innerHTML = d.open
      ? iconHTML(d.value) + `<div>${d.value}</div>`
      : "?";

    el.onclick=()=>{
      if(!prepared || opened) return;

      if(coin < cost()){
        status.textContent="コイン不足";
        return;
      }

      coin -= cost();
      updateUI();

      d.open=true;
      opened=true;
      revealBtn.disabled=false;
      renderCards();

      status.textContent="結果："+d.value;
    };

    cards.appendChild(el);
  });
}

document.getElementById("eatBtn").onclick=()=>{
  coin++; updateUI();
};

document.getElementById("drawBtn").onclick=()=>{
  const avail = DATA.filter(d=>!excluded.has(d.id));
  deck = shuffle(avail).map(d=>({value:d.id,open:false}));
  prepared=true; opened=false;
  revealBtn.disabled=true;
  renderCards();
  status.textContent="カードを選択";
};

document.getElementById("revealBtn").onclick=()=>{
  deck.forEach(d=>d.open=true);
  renderCards();
};

document.getElementById("resetBtn").onclick=()=>{
  excluded.clear();
  deck=[]; prepared=false; opened=false;
  renderExclude(); renderCards(); updateUI();
};

function shuffle(a){
  return [...a].sort(()=>Math.random()-0.5);
}

/* 🔥 ダブルタップズーム防止 */
let lastTouch = 0;
document.addEventListener('touchend', function(e){
  const now = new Date().getTime();
  if(now - lastTouch <= 300){
    e.preventDefault();
  }
  lastTouch = now;
}, false);

renderExclude();
updateUI();
</script>

</body>
</html>
