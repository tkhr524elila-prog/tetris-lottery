<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>テトリミノカード抽選（コイン版）</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
}

.wrap {
  max-width: 900px;
  margin: auto;
}

h1 {
  margin-bottom: 10px;
}

.panel {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 16px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 8px;
}

.toggle {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;
}

.toggle.active {
  background: #111;
  color: #fff;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 12px;
}

.card {
  height: 120px;
  border-radius: 12px;
  border: 1px solid #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  background: #1e40af;
  color: #fff;
  cursor: pointer;
}

.card.open {
  background: #fff;
  color: #000;
}

button {
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid #ccc;
  cursor: pointer;
}

.primary {
  background: #111;
  color: #fff;
}

.status {
  margin-top: 8px;
  font-size: 14px;
}

.coin {
  font-weight: bold;
  font-size: 16px;
}
</style>
</head>

<body>
<div class="wrap">

<h1>テトリミノカード抽選</h1>

<div class="panel">
  <div>コイン：<span class="coin" id="coin">0</span></div>
  <button id="eatBtn">🍽 完食（+1コイン）</button>
</div>

<div class="panel">
  <div>除外カード（選択時はまだコスト消費しない）</div>
  <div class="grid" id="excludeGrid"></div>
</div>

<div class="panel">
  <button class="primary" id="drawBtn">カードを並べる</button>
  <button id="resetBtn">リセット</button>
  <div class="status" id="status">準備OK</div>
  <div class="status" id="costInfo">今回の必要コイン：1</div>
</div>

<div class="panel">
  <div class="cards" id="cards"></div>
</div>

</div>

<script>
const ALL = ["I","O","T","S","Z","J","L","A♥","JOKER"];

let coin = 0;
let excluded = new Set();
let deck = [];
let opened = false;
let deckPrepared = false;

// UI
const coinEl = document.getElementById("coin");
const excludeGrid = document.getElementById("excludeGrid");
const cardsEl = document.getElementById("cards");
const statusEl = document.getElementById("status");
const costInfoEl = document.getElementById("costInfo");

// -------- コイン --------
document.getElementById("eatBtn").onclick = () => {
  coin++;
  updateCoin();
  updateCostInfo();
};

function updateCoin() {
  coinEl.textContent = coin;
}

function getCost() {
  return 1 + excluded.size;
}

function updateCostInfo() {
  costInfoEl.textContent = `今回の必要コイン：${getCost()}`;
}

// -------- 除外UI --------
function renderExclude() {
  excludeGrid.innerHTML = "";

  ALL.forEach(c => {
    const btn = document.createElement("div");
    btn.className = "toggle";
    if (excluded.has(c)) btn.classList.add("active");

    btn.textContent = c;

    btn.onclick = () => {
      // すでにカードを並べた後は、除外変更を禁止
      if (deckPrepared && !opened) {
        statusEl.textContent = "カード準備後は除外を変更できません。リセットしてください。";
        return;
      }
      if (opened) {
        statusEl.textContent = "結果表示後は除外を変更できません。リセットしてください。";
        return;
      }

      if (excluded.has(c)) {
        excluded.delete(c);
      } else {
        excluded.add(c);
      }

      renderExclude();
      updateCostInfo();
    };

    excludeGrid.appendChild(btn);
  });
}

// -------- カード --------
function renderCards() {
  cardsEl.innerHTML = "";

  deck.forEach((c, i) => {
    const el = document.createElement("div");
    el.className = "card";
    if (c.open) el.classList.add("open");

    el.textContent = c.open ? c.value : "?";

    el.onclick = () => {
      if (!deckPrepared) {
        statusEl.textContent = "先に「カードを並べる」を押してください。";
        return;
      }

      if (opened) return;

      const cost = getCost();

      if (coin < cost) {
        statusEl.textContent = `コイン不足（必要 ${cost}）`;
        return;
      }

      coin -= cost;
      updateCoin();

      c.open = true;
      opened = true;
      renderCards();

      statusEl.textContent = `結果：${c.value}（コスト ${cost} 消費）`;
    };

    cardsEl.appendChild(el);
  });
}

// -------- 抽選準備 --------
document.getElementById("drawBtn").onclick = () => {
  const available = ALL.filter(x => !excluded.has(x));

  if (available.length === 0) {
    statusEl.textContent = "カードがありません";
    return;
  }

  deck = shuffle(available).map(v => ({
    value: v,
    open: false
  }));

  opened = false;
  deckPrepared = true;
  renderCards();

  statusEl.textContent = `カードを並べました。1枚選ぶと ${getCost()} コイン消費します。`;
};

// -------- リセット --------
document.getElementById("resetBtn").onclick = () => {
  excluded.clear();
  deck = [];
  opened = false;
  deckPrepared = false;
  renderExclude();
  renderCards();
  updateCostInfo();
  statusEl.textContent = "リセットしました（コインは維持）";
};

// -------- util --------
function shuffle(a) {
  return [...a].sort(() => Math.random() - 0.5);
}

// 初期
renderExclude();
renderCards();
updateCoin();
updateCostInfo();
</script>
</body>
</html>
